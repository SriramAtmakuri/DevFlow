services:
  - type: web
    name: devflow-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: GO_SCRAPER_URL
        sync: false

  - type: web
    name: devflow-go-scraper
    runtime: go
    plan: free
    rootDir: go-scraper
    buildCommand: go build -o scraper .
    startCommand: ./scraper
    envVars:
      - key: SCRAPER_PORT
        value: "8001"

  - type: web
    name: devflow-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
